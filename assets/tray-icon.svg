<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- Simplified daemon silhouette for macOS tray template image -->
  <!-- Left horn -->
  <polygon points="6.5,7 5.5,3 8,6.5" fill="#000000"/>
  <!-- Right horn -->
  <polygon points="15.5,7 16.5,3 14,6.5" fill="#000000"/>

  <!-- Body -->
  <ellipse cx="11" cy="12.5" rx="6" ry="6.5" fill="#000000"/>

  <!-- Eyes (cutout style - white on black) -->
  <ellipse cx="9" cy="11.2" rx="1.5" ry="1.7" fill="#ffffff"/>
  <ellipse cx="13" cy="11.2" rx="1.5" ry="1.7" fill="#ffffff"/>

  <!-- Pupils -->
  <circle cx="9.3" cy="11.4" r="0.7" fill="#000000"/>
  <circle cx="13.3" cy="11.4" r="0.7" fill="#000000"/>

  <!-- Smile -->
  <path d="M9.2,14 Q11,15.5 12.8,14" stroke="#ffffff" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Tail -->
  <path d="M16.5,15 Q18,14.5 18.5,13 Q19,12 19.8,11.8" stroke="#000000" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Tail point -->
  <polygon points="19.8,11.8 21,10.5 20.2,11.5" fill="#000000"/>
</svg>
